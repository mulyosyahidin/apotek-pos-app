services:
  nginx:
    image: nginx:alpine
    container_name: apotek-pos-nginx
    restart: unless-stopped
    volumes:
      - ./docker/production/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app-public:/var/www/html/public
      - app-storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal
      - traefik-public
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.apotek-pos.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.apotek-pos.entrypoints=websecure"
      - "traefik.http.routers.apotek-pos.tls.certresolver=letsencrypt"
      - "traefik.http.services.apotek-pos.loadbalancer.server.port=80"

  app:
    image: ${DOCKER_IMAGE}
    container_name: apotek-pos-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - app-public:/var/www/html/public
      - app-storage:/var/www/html/storage
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  scheduler:
    image: ${DOCKER_IMAGE}
    container_name: apotek-pos-scheduler
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      app:
        condition: service_healthy
    command: ["supervisord", "-c", "/etc/supervisord.conf"]
    healthcheck:
      test: ["CMD-SHELL", "supervisorctl -c /etc/supervisord.conf status laravel-schedule | grep RUNNING || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - app-public:/var/www/html/public
      - app-storage:/var/www/html/storage
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  db:
    image: mysql:8.0
    container_name: apotek-pos-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/production/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${DB_USERNAME} -p${DB_PASSWORD} || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - internal

volumes:
  app-public:
  app-storage:
  db-data:

networks:
  internal:
    name: apotek-pos-internal
  traefik-public:
    external: true
